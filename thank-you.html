<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Success | ClearView Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #020617; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(30, 41, 59, 1); }
  </style>
</head>
<body class="text-slate-200 antialiased flex items-center justify-center min-h-screen p-6">
  <div class="glass p-12 rounded-[2.5rem] max-w-lg w-full text-center shadow-2xl">
    <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-8 shadow-lg shadow-blue-900/50">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
    </div>
    <h1 class="text-3xl font-black text-white mb-4 tracking-tighter">Order Complete!</h1>
    <p id="message" class="text-slate-400 mb-8 leading-relaxed"></p>
    <div class="bg-slate-950/50 p-4 rounded-2xl mb-8 border border-slate-800">
        <p class="text-xs text-slate-500 uppercase tracking-widest font-bold mb-1">Estimated Delivery</p>
        <p class="text-sm text-slate-300">5 - 15 Minutes</p>
    </div>
    <a href="index.html" class="inline-block bg-blue-600 hover:bg-blue-500 text-white font-black px-8 py-4 rounded-2xl transition-all active:scale-95 uppercase tracking-widest text-xs">Return to Store</a>
  </div>

  <script>
    const url = new URL(window.location.href);
    const product = url.searchParams.get('product');
    const email = url.searchParams.get('email');
    document.getElementById('message').innerHTML = product && email ? 
        `Thank you for purchasing <span class="text-blue-400 font-bold">${product}</span>. Access details are being sent to <span class="text-white">${email}</span>.` : 
        "Your payment was successful. Please check your email for confirmation.";
  </script>
</body>
</html>
