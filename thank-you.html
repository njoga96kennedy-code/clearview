<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Confirmed — ClearView Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { background: #020617; font-family: 'DM Sans', sans-serif; }
    h1, h2, h3, .font-display { font-family: 'Syne', sans-serif; }
    .glass { background: rgba(15,23,42,0.9); backdrop-filter: blur(12px); border: 1px solid rgba(51,65,85,0.6); }
    @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .pop-in { animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both; }
    @keyframes fadeUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .fade-up { animation: fadeUp 0.5s ease both; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-slate-200">
  <div class="glass max-w-md w-full rounded-3xl p-8 text-center pop-in shadow-2xl">
    <!-- Success icon -->
    <div class="w-20 h-20 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-6 border border-emerald-500/30">
      <svg class="w-10 h-10 text-emerald-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>

    <h1 class="text-3xl font-black text-white font-display uppercase tracking-tight mb-2">Payment Confirmed!</h1>
    <p id="message" class="text-sm text-slate-400 leading-relaxed mb-8"></p>

    <!-- Steps -->
    <div class="bg-slate-950/60 border border-slate-800 rounded-2xl p-5 text-left mb-6 space-y-3 fade-up" style="animation-delay:0.15s">
      <p class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-3">What happens next</p>
      <div class="flex items-start gap-3">
        <span class="w-5 h-5 bg-blue-600 rounded-full flex items-center justify-center text-[9px] font-black text-white shrink-0 mt-0.5">1</span>
        <p class="text-xs text-slate-300">Check your <strong class="text-white">email inbox</strong> (and spam/junk) for your access credentials and activation link.</p>
      </div>
      <div class="flex items-start gap-3">
        <span class="w-5 h-5 bg-blue-600 rounded-full flex items-center justify-center text-[9px] font-black text-white shrink-0 mt-0.5">2</span>
        <p class="text-xs text-slate-300">Follow the setup instructions included in the email.</p>
      </div>
      <div class="flex items-start gap-3">
        <span class="w-5 h-5 bg-blue-600 rounded-full flex items-center justify-center text-[9px] font-black text-white shrink-0 mt-0.5">3</span>
        <p class="text-xs text-slate-300">Need help? Tap the WhatsApp button below — we're here 24/7.</p>
      </div>
    </div>

    <div class="flex flex-col sm:flex-row gap-3 fade-up" style="animation-delay:0.25s">
      <a href="https://wa.me/254781052997" target="_blank" rel="noopener"
         class="flex-1 bg-[#25D366] hover:bg-[#22c35e] text-white font-black py-3.5 px-4 rounded-xl text-xs uppercase tracking-wider transition-all text-center flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.938 3.659 1.432 5.628 1.433h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        WhatsApp Support
      </a>
      <a href="index.html"
         class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-black py-3.5 px-4 rounded-xl text-xs uppercase tracking-wider transition-all text-center">
        ← Back to Store
      </a>
    </div>
  </div>

  <script>
    // Paystack calls the callback with a reference on success.
    // handlePayment() in index.html redirects here after payment.
    // ?product=NAME and ?ref=REFERENCE are passed in the redirect URL.
    const params  = new URLSearchParams(window.location.search);
    const product = params.get('product');
    const msg     = document.getElementById('message');

    if(product) {
      const span = document.createElement('span');
      span.innerHTML = `Your <strong class="text-white">${product}</strong> access details have been sent to your email. Enjoy! 🎉`;
      msg.appendChild(span);
    } else {
      msg.textContent = 'Your access details have been sent to your email. Thank you for shopping with ClearView Store!';
    }
  </script>
</body>
</html>
