<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="ClearView Store - Premium Digital Subscriptions. Pay securely via M-Pesa, Card, or Bank Transfer.">
  
  <meta property="og:title" content="ClearView Store | Africa's #1 Digital Hub">
  <meta property="og:description" content="Instant access to DSTV, IPTV, and Movies. Secure local payments.">
  <meta property="og:image" content="assets/preview-banner.jpg">
  
  <title>ClearView Store | Africa's Digital Store</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  
  <style>
    body { background-color: #020617; }
    .glass { @apply bg-slate-900/80 backdrop-blur-md border border-slate-800; }
    .currency-pill { @apply px-3 py-1.5 rounded-xl text-xs font-bold border border-slate-700 cursor-pointer transition-all hover:bg-slate-800 text-slate-400; }
    .currency-active { @apply bg-blue-600 border-blue-500 text-white shadow-lg shadow-blue-900/40; }
    
    .logo-3d {
      background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4), inset 0 -4px 6px rgba(0,0,0,0.2);
      transform: perspective(500px) rotateX(10deg);
    }
  </style>
</head>
<body class="text-slate-200 antialiased">

  <a href="https://wa.me/254757780414" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-2xl z-[100] hover:scale-110 transition-all">
    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.588-5.946 0-6.556 5.332-11.888 11.888-11.888 3.176 0 6.161 1.237 8.404 3.48s3.481 5.229 3.481 8.406c0 6.555-5.332 11.887-11.887 11.887-2.01 0-3.991-.51-5.757-1.478l-6.228 1.702zm6.312-3.677c1.54.963 3.536 1.47 5.515 1.47 5.511 0 10.001-4.49 10.001-10.001 0-5.511-4.49-10.001-10.001-10.001-2.67 0-5.18 1.041-7.07 2.93s-2.93 4.401-2.93 7.071c0 2.115.574 4.15 1.66 5.926l-1.008 3.681 3.833-.976z"/></svg>
  </a>

  <header class="glass sticky top-0 z-50 p-4 flex flex-col lg:flex-row justify-between items-center border-b border-slate-800 gap-4">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 logo-3d rounded-xl flex items-center justify-center font-black text-white text-xl">C</div>
        <h1 class="text-2xl font-black text-white tracking-tighter">ClearView <span class="text-blue-500">Store</span></h1>
    </div>
    <div class="flex flex-wrap justify-center gap-2" id="currencySelector">
        <span onclick="setCurrency('USD')" class="currency-pill currency-active" id="btn-USD">USD</span>
        <span onclick="setCurrency('KES')" class="currency-pill" id="btn-KES">KES</span>
        <span onclick="setCurrency('NGN')" class="currency-pill" id="btn-NGN">NGN</span>
        <span onclick="setCurrency('GHS')" class="currency-pill" id="btn-GHS">GHS</span>
        <span onclick="setCurrency('ZAR')" class="currency-pill" id="btn-ZAR">ZAR</span>
        <span onclick="setCurrency('EGP')" class="currency-pill" id="btn-EGP">EGP</span>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-6">
    <section class="text-center py-16">
      <h2 class="text-5xl md:text-7xl font-black mb-6 text-white tracking-tight">Crystal Clear <span class="text-blue-500">Access.</span></h2>
      <p class="text-lg text-slate-400 mb-10 max-w-2xl mx-auto">Instant digital delivery across the continent.</p>
    </section>

    <section id="products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></section>
  </main>

  <script>
    const PAYSTACK_PUBLIC_KEY = 'pk_live_your_actual_key_here';
    let currentCurrency = 'USD';
    let exchangeRates = { USD: 1, KES: 132.5, NGN: 1450, GHS: 14.8, ZAR: 18.4, EGP: 47.5 };

    const products = [
      { name: 'DSTV Stream', priceUSD: 6.00, cat: 'TV', image: 'assets/dstv.jpg', tag: 'Trending', desc: '1 Month Premium Access.' },
      { name: 'IPTV Unlocked', priceUSD: 7.00, cat: 'IPTV', image: 'assets/iptv.jpg', tag: 'Best Seller', desc: 'Global 12,000+ Channels.' },
      { name: 'Sports TV Pro', priceUSD: 8.50, cat: 'TV', image: 'assets/sports.jpg', tag: 'Sports', desc: 'All Major Leagues Live.' },
      { name: 'Movies & Series', priceUSD: 5.00, cat: 'Movies', image: 'assets/movies.jpg', desc: '4K Ultra HD Library.' },
      { name: 'Startimes Combo', priceUSD: 9.80, cat: 'TV', image: 'assets/startimes.jpg', desc: 'Local & Global Content.' },
      { name: 'Standard IPTV', priceUSD: 5.50, cat: 'IPTV', image: 'assets/iptvsub.jpg', desc: 'Reliable SD/HD streams.' }
    ];

    async function fetchLiveRates() {
      try {
        const res = await fetch('https://open.er-api.com/v6/latest/USD');
        const data = await res.json();
        if(data.rates) exchangeRates = data.rates;
      } catch (e) { console.warn("Using fallbacks."); }
    }

    function setCurrency(cur) {
      currentCurrency = cur;
      document.querySelectorAll('.currency-pill').forEach(el => el.classList.remove('currency-active'));
      document.getElementById(`btn-${cur}`).classList.add('currency-active');
      renderProducts();
    }

    function payWithPaystack(product, btnId) {
      const btn = document.getElementById(btnId);
      const userEmail = prompt("Enter delivery email:");
      if (!userEmail || !userEmail.includes('@')) return;

      btn.innerText = "Connecting...";
      btn.disabled = true;

      const convertedPrice = product.priceUSD * exchangeRates[currentCurrency];
      
      const handler = PaystackPop.setup({
        key: PAYSTACK_PUBLIC_KEY,
        email: userEmail,
        amount: Math.round(convertedPrice * 100),
        currency: currentCurrency,
        ref: 'CV-' + Date.now(),
        metadata: {
          custom_fields: [
            { display_name: "Service", variable_name: "service", value: product.name },
            { display_name: "Delivery Email", variable_name: "email", value: userEmail }
          ]
        },
        callback: function(response) {
          window.location.href = `thank-you.html?product=${encodeURIComponent(product.name)}&email=${encodeURIComponent(userEmail)}&ref=${response.reference}`;
        },
        onClose: function() {
          btn.innerText = "Instant Access";
          btn.disabled = false;
        }
      });
      handler.openIframe();
    }

    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = products.map((p, i) => {
        const localPrice = (p.priceUSD * exchangeRates[currentCurrency]).toLocaleString(undefined, {
            style: 'currency',
            currency: currentCurrency,
            maximumFractionDigits: 0
        });

        return `
          <div class="bg-slate-900 rounded-[2rem] overflow-hidden border border-slate-800 transition-all hover:border-blue-500/40 relative group">
            <div class="relative h-56 overflow-hidden">
              <img src="${p.image}" class="w-full h-full object-cover opacity-60 transition-all duration-700 group-hover:scale-110" loading="lazy">
              <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/20 to-transparent"></div>
            </div>
            <div class="p-8 -mt-12 relative z-10">
              <h3 class="text-2xl font-black text-white mb-1">${p.name}</h3>
              <p class="text-3xl font-black text-white mb-4">${localPrice}</p>
              <p class="text-sm text-slate-500 mb-8 min-h-[48px]">${p.desc}</p>
              <button id="btn-pay-${i}" onclick='payWithPaystack(${JSON.stringify(p)}, "btn-pay-${i}")' 
                class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-blue-900/20 active:scale-95 uppercase tracking-widest text-xs">
                Instant Access
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    window.addEventListener('DOMContentLoaded', async () => {
      await fetchLiveRates();
      renderProducts();
    });
  </script>
</body>
</html>
