<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyDigitalHub | Africa's Digital Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>
    body { background-color: #020617; }
    .glass { @apply bg-slate-900/80 backdrop-blur-md border border-slate-800; }
    .currency-pill { @apply px-3 py-1.5 rounded-xl text-xs font-bold border border-slate-700 cursor-pointer transition hover:bg-slate-800 text-slate-400; }
    .currency-active { @apply bg-blue-600 border-blue-500 text-white shadow-lg shadow-blue-900/40; }
  </style>
</head>
<body class="text-slate-200 antialiased">

  <header class="glass sticky top-0 z-50 p-4 flex flex-col md:flex-row justify-between items-center border-b gap-4">
    <h1 class="text-2xl font-black text-blue-500 tracking-tighter">MyDigitalHub</h1>
    
    <div class="flex flex-wrap justify-center gap-2" id="currencySelector">
        <span onclick="setCurrency('USD')" class="currency-pill currency-active" id="btn-USD">🇺🇸 USD</span>
        <span onclick="setCurrency('KES')" class="currency-pill" id="btn-KES">🇰🇪 KES</span>
        <span onclick="setCurrency('NGN')" class="currency-pill" id="btn-NGN">🇳🇬 NGN</span>
        <span onclick="setCurrency('GHS')" class="currency-pill" id="btn-GHS">🇬🇭 GHS</span>
        <span onclick="setCurrency('ZAR')" class="currency-pill" id="btn-ZAR">🇿🇦 ZAR</span>
        <span onclick="setCurrency('EGP')" class="currency-pill" id="btn-EGP">🇪🇬 EGP</span>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-6">
    <section class="text-center py-12">
      <h2 class="text-4xl font-black text-white mb-4">Instant Digital Subscriptions</h2>
      <p class="text-slate-400">Pay using M-Pesa, Bank Transfer, or Mobile Money in your local currency.</p>
    </section>

    <section id="products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></section>
  </main>

  <script>
    const PAYSTACK_PUBLIC_KEY = 'pk_live_your_actual_key_here';
    let currentCurrency = 'USD';
    let exchangeRates = { USD: 1, KES: 132.5, NGN: 1450, GHS: 14.8, ZAR: 18.5, EGP: 47.8 };

    const products = [
      { name: 'DSTV Stream', priceUSD: 6.00, cat: 'TV', image: 'assets/dstv.jpg', desc: '1 Month Premium Access' },
      { name: 'IPTV Unlocked', priceUSD: 7.00, cat: 'IPTV', image: 'assets/iptv.jpg', desc: 'Global 12,000+ Channels' },
      { name: 'Sports TV Pro', priceUSD: 8.50, cat: 'TV', image: 'assets/sports.jpg', desc: 'All Major Leagues Live' },
      { name: 'Movies & Series', priceUSD: 5.00, cat: 'Movies', image: 'assets/movies.jpg', desc: '4K Ultra HD Library' },
      { name: 'Startimes Combo', priceUSD: 9.80, cat: 'TV', image: 'assets/startimes.jpg', desc: 'Local & Global Content' },
      { name: 'Standard IPTV', priceUSD: 5.50, cat: 'IPTV', image: 'assets/iptvsub.jpg', desc: 'Reliable SD/HD streams' }
    ];

    async function updateRates() {
      try {
        const res = await fetch('https://open.er-api.com/v6/latest/USD');
        const data = await res.json();
        if(data.rates) exchangeRates = data.rates;
      } catch (e) { console.warn("Live rates unavailable, using pre-set fallbacks."); }
    }

    function setCurrency(cur) {
      currentCurrency = cur;
      document.querySelectorAll('.currency-pill').forEach(el => el.classList.remove('currency-active'));
      document.getElementById(`btn-${cur}`).classList.add('currency-active');
      renderProducts();
    }

    function payWithPaystack(product) {
      const userEmail = prompt("Where should we send your subscription details?");
      if (!userEmail || !userEmail.includes('@')) return;

      const convertedPrice = product.priceUSD * exchangeRates[currentCurrency];
      
      const handler = PaystackPop.setup({
        key: PAYSTACK_PUBLIC_KEY,
        email: userEmail,
        amount: Math.round(convertedPrice * 100), // Convert to subunits
        currency: currentCurrency,
        ref: 'MDH-' + Date.now(),
        callback: function(response) {
          // Redirect to existing thank-you page
          window.location.href = `thank-you.html?product=${encodeURIComponent(product.name)}&email=${encodeURIComponent(userEmail)}&ref=${response.reference}`;
        }
      });
      handler.openIframe();
    }

    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = products.map(p => {
        const localPrice = (p.priceUSD * exchangeRates[currentCurrency]).toLocaleString(undefined, {
            style: 'currency',
            currency: currentCurrency,
            maximumFractionDigits: 0
        });

        return `
          <div class="bg-slate-900 rounded-3xl overflow-hidden border border-slate-800 p-6 transition-all hover:border-blue-500/40 group shadow-2xl">
            <img src="${p.image}" class="w-full h-44 object-cover rounded-2xl mb-4 opacity-70 group-hover:opacity-100 transition-opacity">
            <h3 class="text-xl font-bold text-white tracking-tight">${p.name}</h3>
            <p class="text-3xl font-black text-blue-500 my-3">${localPrice}</p>
            <p class="text-sm text-slate-400 mb-6 leading-relaxed">${p.desc}</p>
            <button onclick='payWithPaystack(${JSON.stringify(p)})' 
              class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg shadow-blue-900/20">
              Buy Now
            </button>
          </div>
        `;
      }).join('');
    }

    window.addEventListener('DOMContentLoaded', async () => {
      await updateRates();
      renderProducts();
    });
  </script>
</body>
</html>
