<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="ClearView Store - Africa's premier digital subscription hub. Fast delivery, secure payments.">
  <title>ClearView Store | Crystal Clear Access</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  
  <style>
    body { background-color: #020617; }
    .glass { @apply bg-slate-900/80 backdrop-blur-md border border-slate-800; }
    .currency-pill { @apply px-3 py-1.5 rounded-xl text-xs font-bold border border-slate-700 cursor-pointer transition-all hover:bg-slate-800 text-slate-400; }
    .currency-active { @apply bg-blue-600 border-blue-500 text-white shadow-lg shadow-blue-900/40; }
    
    .logo-3d {
      background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4), inset 0 -4px 6px rgba(0,0,0,0.2);
    }

    /* Social Proof Toast Styles */
    #toastContainer {
        position: fixed;
        bottom: 24px;
        left: 24px;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        gap: 10px;
        pointer-events: none;
    }
    .toast {
        @apply glass text-white text-[11px] font-bold px-5 py-3 rounded-2xl border-l-4 shadow-2xl;
        pointer-events: auto;
        animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        border-color: #10b981; /* Success Green */
    }
    @keyframes slideIn {
        from { transform: translateX(-120%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
    .toast-fade-out {
        animation: slideOut 0.5s ease forwards;
    }
    @keyframes slideOut {
        from { transform: translateX(0); opacity: 1; }
        to { transform: translateX(-120%); opacity: 0; }
    }
  </style>
</head>
<body class="text-slate-200 antialiased font-sans">

  <div id="toastContainer"></div>

  <header class="glass sticky top-0 z-50 p-4 flex flex-col lg:flex-row justify-between items-center border-b border-slate-800 gap-4">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 logo-3d rounded-xl flex items-center justify-center font-black text-white text-xl">C</div>
        <h1 class="text-2xl font-black text-white tracking-tighter">ClearView <span class="text-blue-500">Store</span></h1>
    </div>
    <div class="flex flex-wrap justify-center gap-2" id="currencySelector">
        <span onclick="setCurrency('USD')" class="currency-pill currency-active" id="btn-USD">USD</span>
        <span onclick="setCurrency('KES')" class="currency-pill" id="btn-KES">KES</span>
        <span onclick="setCurrency('NGN')" class="currency-pill" id="btn-NGN">NGN</span>
        <span onclick="setCurrency('GHS')" class="currency-pill" id="btn-GHS">GHS</span>
        <span onclick="setCurrency('ZAR')" class="currency-pill" id="btn-ZAR">ZAR</span>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-6">
    <section class="text-center py-16">
      <h2 class="text-5xl md:text-7xl font-black mb-6 text-white tracking-tight leading-none">Crystal Clear <span class="text-blue-500 text-shadow-xl">Access.</span></h2>
      <p class="text-lg text-slate-400 mb-10 max-w-2xl mx-auto">Fast, secure, and instant delivery on all digital goods.</p>
    </section>

    <section id="products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></section>
  </main>

  <script>
    const PAYSTACK_PUBLIC_KEY = 'pk_live_ef7d34cf55b8a86c1da377997b0705b622c9d0ae';
    let currentCurrency = 'USD';
    let exchangeRates = { USD: 1, KES: 132.5, NGN: 1450, GHS: 14.8, ZAR: 18.4 };

    const products = [
      { id: 0, name: 'Standard IPTV', priceUSD: 6.00, image: 'assets/iptvsub.jpg' },
      { id: 1, name: 'IPTV Unlocked', priceUSD: 7.00, image: 'assets/iptv.jpg' },
      { id: 2, name: 'Spotify Pro', priceUSD: 4.00, image: 'assets/spotify.jpg' },
      { id: 3, name: 'CapCut Pro', priceUSD: 5.00, image: 'assets/capcut.jpg' },
      { id: 4, name: 'DSTV Stream', priceUSD: 6.00, image: 'assets/dstv.jpg' },
      { id: 5, name: 'Sports TV Pro', priceUSD: 8.50, image: 'assets/sports.jpg' },
      { id: 6, name: 'Startimes Combo', priceUSD: 9.80, image: 'assets/startimes.jpg' },
      { id: 7, name: 'Netflix Pro', priceUSD: 5.00, image: 'assets/movies.jpg' }
    ];

    const locations = ["Nairobi", "Lagos", "Accra", "Johannesburg", "Mombasa", "Abuja", "Kumasi", "Cape Town", "Eldoret", "Kampala"];

    function showSocialToast(message) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = message;
        container.appendChild(toast);

        // Remove toast after 5 seconds
        setTimeout(() => {
            toast.classList.add('toast-fade-out');
            setTimeout(() => toast.remove(), 500);
        }, 5000);
    }

    // Logic to trigger social proof notifications
    function startSocialProof() {
        const trigger = () => {
            const randomLoc = locations[Math.floor(Math.random() * locations.length)];
            const randomProd = products[Math.floor(Math.random() * products.length)].name;
            showSocialToast(`🔥 Someone in ${randomLoc} just purchased ${randomProd}!`);
            
            // Schedule next toast between 15-35 seconds
            const nextTime = Math.random() * (35000 - 15000) + 15000;
            setTimeout(trigger, nextTime);
        };
        
        // Initial delay before first toast
        setTimeout(trigger, 5000);
    }

    function setCurrency(cur) {
      currentCurrency = cur;
      document.querySelectorAll('.currency-pill').forEach(el => el.classList.remove('currency-active'));
      document.getElementById(`btn-${cur}`).classList.add('currency-active');
      renderProducts();
    }

    function handlePayment(index) {
        const product = products[index];
        const email = document.getElementById(`email-${index}`).value;
        const btn = document.getElementById(`pay-btn-${index}`);
        
        if (!email || !email.includes('@')) return showSocialToast("⚠️ Valid email required.");

        btn.innerText = "Connecting...";
        btn.disabled = true;

        const handler = PaystackPop.setup({
            key: PAYSTACK_PUBLIC_KEY,
            email: email,
            amount: Math.floor(product.priceUSD * exchangeRates[currentCurrency] * 100),
            currency: currentCurrency,
            callback: (res) => { 
                window.location.href = `thank-you.html?product=${encodeURIComponent(product.name)}&email=${encodeURIComponent(email)}&ref=${res.reference}`;
            },
            onClose: () => { 
                btn.innerText = "Instant Access"; 
                btn.disabled = false; 
            }
        });
        handler.openIframe();
    }

    function renderProducts() {
      document.getElementById('products').innerHTML = products.map((p, i) => {
        const localPrice = (p.priceUSD * exchangeRates[currentCurrency]).toLocaleString(undefined, { style: 'currency', currency: currentCurrency, maximumFractionDigits: 0 });
        
        return `
        <div class="bg-slate-900 rounded-[2.5rem] overflow-hidden border border-slate-800 transition-all hover:border-blue-500/40 relative group">
          <div class="relative h-44 overflow-hidden">
            <img src="${p.image}" class="w-full h-full object-cover opacity-50 group-hover:scale-110 transition-all duration-700">
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent"></div>
          </div>
          <div class="p-6 -mt-8 relative z-10">
            <h3 class="text-xl font-black text-white mb-1 uppercase tracking-tight">${p.name}</h3>
            <p class="text-2xl font-black text-blue-500 mb-4">${localPrice}</p>
            <input type="email" id="email-${i}" placeholder="Delivery Email" 
                   class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-[11px] text-white mb-3 focus:outline-none focus:border-blue-500">
            <button id="pay-btn-${i}" onclick="handlePayment(${i})" 
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-xl transition-all uppercase text-[10px]">
                Instant Access
            </button>
          </div>
        </div>
      `}).join('');
    }

    async function initialize() {
      try {
        const res = await fetch('https://open.er-api.com/v6/latest/USD');
        const data = await res.json();
        if(data.rates) exchangeRates = data.rates;
      } catch (e) { console.warn("Exchange fallbacks used."); }
      renderProducts();
      startSocialProof();
    }
    window.addEventListener('DOMContentLoaded', initialize);
  </script>
</body>
</html>
