<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Affordable DSTV, Startimes, and IPTV subscriptions at MyDigitalHub. Secure PayPal checkout.">
  <title>MyDigitalHub - Digital Subscriptions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.paypal.com/sdk/js?client-id=AfqpacUeuOAbye2O9J9dNJU7hkwTXfTsay3_Yt1Yugr6LU8KEMGUCYXMhHq886CdIfGPA0F7UAl4RSIL&currency=USD&components=buttons&enable-funding=card"></script>
  <style>
    /* Custom badge styling for the dark theme */
    .badge { @apply absolute top-3 right-3 px-3 py-1 text-xs font-bold text-white rounded-full shadow-lg; }
    body { background-color: #020617; /* Tailwind bg-slate-950 */ }
  </style>
</head>
<body class="text-slate-200 antialiased">

  <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-50 p-4 flex justify-between items-center">
    <h1 class="text-2xl font-black text-blue-500 tracking-tight">MyDigitalHub</h1>
    <nav class="hidden md:block">
      <a href="#" class="px-4 font-medium hover:text-blue-400 transition">Home</a>
      <a href="#products" class="px-4 font-medium hover:text-blue-400 transition">Products</a>
      <a href="https://wa.me/254757780414" class="px-4 font-medium text-green-500 hover:text-green-400">Support</a>
    </nav>
  </header>

  <main class="max-w-6xl mx-auto p-6">
    <section class="text-center py-16">
      <h2 class="text-4xl md:text-5xl font-extrabold mb-4 text-white">Premium Digital Access.</h2>
      <p class="text-lg text-slate-400 mb-10">Secure PayPal checkout. Trusted digital partner in Kenya.</p>
      
      <div class="flex flex-col md:flex-row gap-4 justify-center items-center bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-2xl">
        <input type="text" id="searchInput" placeholder="Search for a service..." class="w-full md:w-80 p-3 bg-slate-800 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-white placeholder-slate-500">
        <select id="categoryFilter" class="w-full md:w-auto p-3 bg-slate-800 border border-slate-700 rounded-xl text-white outline-none">
            <option value="All">All Categories</option>
            <option value="TV">Live TV</option>
            <option value="Movies">Movies & Shows</option>
            <option value="IPTV">IPTV Special</option>
        </select>
      </div>
    </section>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-16 text-center text-sm font-semibold text-slate-500">
        <div class="flex items-center justify-center gap-2"><span>🚀</span> Instant Email Delivery</div>
        <div class="flex items-center justify-center gap-2"><span>🔒</span> PayPal Secure Payment</div>
        <div class="flex items-center justify-center gap-2"><span>💬</span> 24/7 WhatsApp Help</div>
    </div>

    <section id="products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></section>
  </main>

  <footer id="contact" class="bg-slate-900 p-12 text-center mt-20 border-t border-slate-800">
    <p class="text-slate-300 font-bold mb-4">Need immediate help?</p>
    <a href="https://wa.me/254757780414?text=Hi%20MyDigitalHub,%20I%20need%20help%20with%20a%20subscription" 
       class="inline-block bg-green-600 text-white px-8 py-3 rounded-full font-bold hover:bg-green-500 transition-all transform hover:scale-105">
       Message on WhatsApp
    </a>
    <p class="text-xs text-slate-500 mt-8">&copy; 2026 MyDigitalHub. All rights reserved.</p>
  </footer>

  <script>
    const KES_RATE = 130.00; // Estimated exchange rate
    const products = [
      { name: 'DSTV Stream', price: 6.00, cat: 'TV', image: 'assets/dstv.jpg', tag: 'Popular', desc: '1 Month Live Streaming' },
      { name: 'Startimes ON', price: 9.80, cat: 'TV', image: 'assets/startimes.jpg', desc: 'Premium Live Access' },
      { name: 'Sports TV', price: 8.50, cat: 'TV', image: 'assets/sports.jpg', tag: 'Best for Sports', desc: 'EPL & Champions League' },
      { name: 'Movies & TV Shows', price: 5.00, cat: 'Movies', image: 'assets/movies.jpg', desc: 'Trending VOD Library' },
      { name: 'IPTV Subscription', price: 5.50, cat: 'IPTV', image: 'assets/iptvsub.jpg', desc: 'Multi-device support' },
      { name: 'IPTV Unlocked', price: 7.00, cat: 'IPTV', image: 'assets/iptv.jpg', tag: 'Top Rated', desc: 'Global Unlocked Content' }
    ];

    function renderProducts(filter = 'All', search = '') {
      const container = document.getElementById('products');
      container.innerHTML = '';

      const filtered = products.filter(p => {
        const matchesCat = filter === 'All' || p.cat === filter;
        const matchesSearch = p.name.toLowerCase().includes(search.toLowerCase());
        return matchesCat && matchesSearch;
      });

      filtered.forEach((product, i) => {
        const card = document.createElement('div');
        // Dark card styling with subtle border
        card.className = "bg-slate-900 rounded-2xl shadow-2xl overflow-hidden border border-slate-800 transition-all hover:border-blue-500/50 relative group";
        
        const badge = product.tag ? `<span class="badge bg-blue-600">${product.tag}</span>` : '';
        const kesPrice = (product.price * KES_RATE).toLocaleString();

        card.innerHTML = `
          ${badge}
          <div class="overflow-hidden">
            <img src="${product.image}" alt="${product.name}" class="w-full h-48 object-cover transition-transform duration-500 group-hover:scale-110 opacity-80 group-hover:opacity-100">
          </div>
          <div class="p-6">
            <h3 class="text-xl font-bold text-white mb-1">${product.name}</h3>
            <p class="text-xs text-blue-400 font-bold uppercase tracking-wider mb-3">${product.cat}</p>
            <div class="flex justify-between items-baseline mb-4">
                <span class="text-3xl font-black text-white">$${product.price.toFixed(2)}</span>
                <span class="text-xs font-medium text-slate-500 italic">~ KES ${kesPrice}</span>
            </div>
            <p class="text-sm text-slate-400 mb-6 leading-relaxed">${product.desc}</p>
            <div id="paypal-button-${i}"></div>
          </div>
        `;
        container.appendChild(card);

        paypal.Buttons({
          style: { layout: 'horizontal', color: 'blue', shape: 'rect', label: 'pay' },
          createOrder: (data, actions) => {
            return actions.order.create({
              purchase_units: [{ amount: { value: product.price.toFixed(2) }, description: product.name }]
            });
          },
          onApprove: (data, actions) => {
            return actions.order.capture().then(details => {
              const name = encodeURIComponent(product.name);
              const email = encodeURIComponent(details.payer.email_address);
              window.location.href = `thank-you.html?product=${name}&email=${email}`;
            });
          }
        }).render(`#paypal-button-${i}`);
      });
    }

    document.getElementById('searchInput').addEventListener('input', (e) => renderProducts(document.getElementById('categoryFilter').value, e.target.value));
    document.getElementById('categoryFilter').addEventListener('change', (e) => renderProducts(e.target.value, document.getElementById('searchInput').value));

    window.addEventListener('DOMContentLoaded', () => renderProducts());
  </script>
</body>
</html>
