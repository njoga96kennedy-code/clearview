<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearView TV Store</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* HEADER */
.header {
    background: #fff;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    border-bottom: 1px solid #ddd;
}

.header img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
}

.header h2 {
    margin: 0;
}

.header p {
    margin: 5px 0 0;
    font-size: 14px;
    color: #666;
}

/* GRID */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* CARD */
.card {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.2s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-5px);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

/* INFO */
.card-content {
    padding: 10px;
}

.card-title {
    font-size: 14px;
    margin: 0;
}

.price {
    color: #000;
    font-weight: bold;
    margin-top: 5px;
}

/* BUTTON */
.buy-btn {
    display: block;
    text-align: center;
    background: #000;
    color: #fff;
    padding: 8px;
    margin: 10px;
    border-radius: 5px;
    text-decoration: none;
    font-size: 13px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="https://via.placeholder.com/60" alt="logo">
    <div>
        <h2>ClearView TV</h2>
        <p>Premium IPTV • Movies • Sports • Affordable instant setup</p>
    </div>
</div>

<!-- PRODUCTS -->
<div class="products">

<div class="card">
    <img src="https://via.placeholder.com/300x200">
    <div class="card-content">
        <p class="card-title">IPTV Ultimate</p>
        <p class="price">KSh 800</p>
    </div>
    <a href="#" class="buy-btn">Buy</a>
</div>

<div class="card">
    <img src="https://via.placeholder.com/300x200">
    <div class="card-content">
        <p class="card-title">Live Sports TV</p>
        <p class="price">KSh 600</p>
    </div>
    <a href="#" class="buy-btn">Buy</a>
</div>

<div class="card">
    <img src="https://via.placeholder.com/300x200">
    <div class="card-content">
        <p class="card-title">Netflix Premium</p>
        <p class="price">KSh 1000</p>
    </div>
    <a href="#" class="buy-btn">Buy</a>
</div>

<div class="card">
    <img src="https://via.placeholder.com/300x200">
    <div class="card-content">
        <p class="card-title">Family 4K Package</p>
        <p class="price">KSh 2000</p>
    </div>
    <a href="#" class="buy-btn">Buy</a>
</div>

</div>

</body>
</html>
