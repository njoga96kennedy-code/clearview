<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyDigitalHub</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<header class="bg-white shadow-md p-4 flex justify-between">
  <h1 class="text-xl font-bold text-blue-600">MyDigitalHub</h1>
</header>

<main class="p-6">

<h2 class="text-2xl font-bold text-center mb-6">
Affordable Digital Subscriptions
</h2>

<div id="products" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

</main>

<script>

const PAYSTACK_KEY = "YOUR_PUBLIC_KEY_HERE";

const products = [
  {
    name: "DSTV Stream",
    price: 800,
    image: "dstv.jpg"
  },
  {
    name: "Startimes ON",
    price: 1000,
    image: "startimes.jpg"
  },
  {
    name: "Sports TV",
    price: 900,
    image: "sports.jpg"
  },
  {
    name: "Movies Package",
    price: 950,
    image: "movies.jpg"
  },
  {
    name: "YouTube Premium",
    price: 700,
    image: "youtube.jpg"
  }
];

function payWithPaystack(product) {

  let email = prompt("Enter your email:");
  if(!email) return;

  let handler = PaystackPop.setup({
    key: PAYSTACK_KEY,
    email: email,
    amount: product.price * 100,
    currency: "KES",

    callback: function(response) {
      window.location.href = 
      `thank-you.html?product=${encodeURIComponent(product.name)}&email=${email}`;
    },

    onClose: function() {
      alert("Payment cancelled");
    }
  });

  handler.openIframe();
}

function renderProducts() {

  const container = document.getElementById("products");

  container.innerHTML = products.map(p => `
    <div class="bg-white p-4 rounded shadow">

      <img src="${p.image}" class="w-full h-40 object-cover mb-3 rounded">

      <h3 class="font-bold text-lg">${p.name}</h3>
      <p class="text-gray-600 mb-3">KES ${p.price}</p>

      <button onclick='payWithPaystack(${JSON.stringify(p)})'
      class="bg-blue-600 text-white px-4 py-2 rounded w-full">
        Pay Now
      </button>

    </div>
  `).join("");

}

renderProducts();

</script>

</body>
</html>
