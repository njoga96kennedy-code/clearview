<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyDigitalHub | Global Subscriptions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>
    body { background-color: #020617; }
    .glass { @apply bg-slate-900/80 backdrop-blur-md border border-slate-800; }
    .currency-pill { @apply px-3 py-1 rounded-full text-xs font-bold border border-slate-700 cursor-pointer transition; }
    .currency-active { @apply bg-blue-600 border-blue-500 text-white; }
  </style>
</head>
<body class="text-slate-200 antialiased">

  <header class="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b">
    <h1 class="text-2xl font-black text-blue-500 tracking-tighter">MyDigitalHub</h1>
    <div class="flex gap-2" id="currencySelector">
        <span onclick="setCurrency('USD')" class="currency-pill currency-active" id="btn-USD">USD</span>
        <span onclick="setCurrency('KES')" class="currency-pill" id="btn-KES">KES</span>
        <span onclick="setCurrency('NGN')" class="currency-pill" id="btn-NGN">NGN</span>
        <span onclick="setCurrency('GHS')" class="currency-pill" id="btn-GHS">GHS</span>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-6">
    <section class="text-center py-12">
      <h2 class="text-4xl font-black text-white mb-4">Global Digital Access</h2>
      <p class="text-slate-400">Select your preferred currency and pay securely via Paystack.</p>
    </section>

    <section id="products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></section>
  </main>

  <script>
    const PAYSTACK_PUBLIC_KEY = 'pk_live_your_actual_key_here';
    let currentCurrency = 'USD';
    let exchangeRates = { USD: 1, KES: 132.5, NGN: 1450, GHS: 14.5 }; // Fallback rates

    const products = [
      { name: 'DSTV Stream', priceUSD: 6.00, cat: 'TV', image: 'assets/dstv.jpg', desc: '1 Month Premium Access' },
      { name: 'IPTV Unlocked', priceUSD: 7.00, cat: 'IPTV', image: 'assets/iptv.jpg', desc: 'Global 12,000+ Channels' },
      { name: 'Sports TV Pro', priceUSD: 8.50, cat: 'TV', image: 'assets/sports.jpg', desc: 'All Major Leagues Live' },
      { name: 'Movies & Series', priceUSD: 5.00, cat: 'Movies', image: 'assets/movies.jpg', desc: '4K Ultra HD Library' },
      { name: 'Startimes Combo', priceUSD: 9.80, cat: 'TV', image: 'assets/startimes.jpg', desc: 'Local & Global Content' },
      { name: 'Standard IPTV', priceUSD: 5.50, cat: 'IPTV', image: 'assets/iptvsub.jpg', desc: 'Reliable SD/HD streams' }
    ];

    async function updateRates() {
      try {
        const res = await fetch('https://open.er-api.com/v6/latest/USD');
        const data = await res.json();
        exchangeRates = data.rates;
      } catch (e) { console.warn("Using fallback rates."); }
    }

    function setCurrency(cur) {
      currentCurrency = cur;
      document.querySelectorAll('.currency-pill').forEach(el => el.classList.remove('currency-active'));
      document.getElementById(`btn-${cur}`).classList.add('currency-active');
      renderProducts();
    }

    function payWithPaystack(product) {
      const userEmail = prompt("Enter your email for delivery:");
      if (!userEmail) return;

      // Calculate localized price
      const convertedPrice = product.priceUSD * (exchangeRates[currentCurrency] || 1);
      
      const handler = PaystackPop.setup({
        key: PAYSTACK_PUBLIC_KEY,
        email: userEmail,
        // Paystack expects the smallest currency unit (cents/kobo/pesewas)
        amount: Math.round(convertedPrice * 100), 
        currency: currentCurrency, 
        ref: 'GLOB-' + Date.now(),
        callback: function(response) {
          window.location.href = `thank-you.html?product=${encodeURIComponent(product.name)}&email=${encodeURIComponent(userEmail)}&ref=${response.reference}`;
        }
      });
      handler.openIframe();
    }

    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = products.map(p => {
        const localPrice = (p.priceUSD * (exchangeRates[currentCurrency] || 1)).toLocaleString(undefined, {
            style: 'currency',
            currency: currentCurrency
        });

        return `
          <div class="bg-slate-900 rounded-3xl overflow-hidden border border-slate-800 p-6 shadow-2xl">
            <img src="${p.image}" class="w-full h-40 object-cover rounded-xl mb-4 opacity-80">
            <h3 class="text-xl font-bold text-white">${p.name}</h3>
            <p class="text-2xl font-black text-blue-400 my-2">${localPrice}</p>
            <p class="text-sm text-slate-400 mb-6">${p.desc}</p>
            <button onclick='payWithPaystack(${JSON.stringify(p)})' 
              class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition">
              Purchase
            </button>
          </div>
        `;
      }).join('');
    }

    window.addEventListener('DOMContentLoaded', async () => {
      await updateRates();
      renderProducts();
    });
  </script>
</body>
</html>
