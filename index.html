<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyDigitalHub - Premium Digital Access</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- PayPal -->
  <script src="https://www.paypal.com/sdk/js?client-id=AfqpacUeuOAbye2O9J9dNJU7hkwTXfTsay3_Yt1Yugr6LU8KEMGUCYXMhHq886CdIfGPA0F7UAl4RSIL&currency=USD&components=buttons&enable-funding=card"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<!-- HEADER -->
<header class="bg-white shadow-md p-4 flex justify-between">
  <h1 class="text-2xl font-bold text-blue-600">MyDigitalHub</h1>
  <nav>
    <a href="#" class="px-3">Home</a>
    <a href="#products" class="px-3">Products</a>
    <a href="#contact" class="px-3">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="text-center py-12 bg-gradient-to-r from-blue-600 to-indigo-600 text-white">
  <h2 class="text-4xl font-bold mb-3">Unlimited Entertainment, One Click Away</h2>
  <p class="mb-3">Instant access to streaming & sports</p>
  <span class="bg-white text-blue-600 px-4 py-2 rounded-full font-semibold">
    🔥 From $5 Only
  </span>
</section>

<!-- PRODUCTS -->
<section id="products" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 p-6"></section>

<!-- TESTIMONIALS -->
<section class="p-6">
  <h3 class="text-xl font-bold text-center mb-4">What Customers Say</h3>
  <div class="grid md:grid-cols-3 gap-4">
    <div class="bg-white p-4 rounded shadow">⭐⭐⭐⭐⭐<br>Fast delivery. Works perfectly!</div>
    <div class="bg-white p-4 rounded shadow">⭐⭐⭐⭐⭐<br>Best deals online 🔥</div>
    <div class="bg-white p-4 rounded shadow">⭐⭐⭐⭐⭐<br>Very reliable service</div>
  </div>
</section>

<!-- FOOTER -->
<footer id="contact" class="bg-white p-6 text-center border-t">
  <p>WhatsApp: <a href="https://wa.me/254757780414" class="text-blue-500 underline">+254757780414</a></p>
  <p class="text-sm text-gray-400 mt-2">© 2025 MyDigitalHub</p>
</footer>

<script>
const products = [
  {
    name: 'Premium Live TV Access',
    price: 6.00,
    description: 'Watch global live TV instantly.',
    image: 'assets/dstv.jpg'
  },
  {
    name: 'Sports Streaming Package',
    price: 8.50,
    description: 'Enjoy football & live sports.',
    image: 'assets/sports.jpg'
  },
  {
    name: 'Movies & Series Access',
    price: 9.00,
    description: 'Unlimited trending movies.',
    image: 'assets/movies.jpg'
  }
];

function createCard(p, i) {
  return `
    <div class="bg-white rounded-xl shadow p-4">
      <img src="${p.image}" class="w-full h-40 object-cover rounded mb-3">
      <h3 class="font-bold">${p.name}</h3>
      <p class="text-green-600">$${p.price}</p>
      <p class="text-sm text-gray-500 mb-2">${p.description}</p>
      <p class="text-xs text-gray-400">✔ Instant Delivery</p>
      <div id="paypal-${i}" class="mt-2"></div>
    </div>
  `;
}

function render() {
  const container = document.getElementById('products');
  container.innerHTML = products.map(createCard).join('');

  products.forEach((p, i) => {
    paypal.Buttons({
      createOrder: (data, actions) => {
        return actions.order.create({
          purchase_units: [{
            amount: { value: p.price },
            description: p.name
          }]
        });
      },

      onApprove: (data, actions) => {
        return actions.order.capture().then(details => {
          const product = encodeURIComponent(p.name);
          const email = encodeURIComponent(details.payer.email_address);

          window.location.href = `thank-you.html?product=${product}&email=${email}`;
        });
      }
    }).render(`#paypal-${i}`);
  });
}

window.onload = render;
</script>

</body>
</html>
