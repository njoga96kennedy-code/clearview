<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClearVieaw Store - Digital Subscriptions</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ✅ Paystack SDK -->
  <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- Header -->
  <header class="bg-white shadow-md p-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-blue-600">ClearVieaw Store</h1>
    <nav>
      <a href="#" class="px-4 text-gray-700 hover:text-blue-500">Home</a>
      <a href="#products" class="px-4 text-gray-700 hover:text-blue-500">Products</a>
      <a href="#contact" class="px-4 text-gray-700 hover:text-blue-500">Contact</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <main class="p-6">
    <section class="text-center mb-10">
      <h2 class="text-3xl font-bold mb-2">Your One-Stop Shop for Digital Products</h2>
      <p class="text-gray-600">Affordable plans and Secure checkout with multiple payment methods!</p>
    </section>

    <!-- Payment Method Selector -->
    <section class="text-center mb-8">
      <p class="text-gray-700 font-semibold mb-4">Select Your Payment Method:</p>
      <div class="flex flex-wrap justify-center gap-4">
        <button onclick="setPaymentMethod('paystack')" class="px-6 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition font-semibold ring-4 ring-yellow-400" id="btn-paystack">
          🇰🇪 Paystack (Africa)
        </button>
        <button onclick="setPaymentMethod('mpesa')" class="px-6 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 transition font-semibold" id="btn-mpesa">
          📱 M-Pesa (Kenya)
        </button>
      </div>
    </section>

    <!-- Product Grid -->
    <section id="products" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 p-6"></section>
  </main>

  <!-- Footer -->
  <footer id="contact" class="bg-white p-6 text-center mt-10 border-t">
    <p class="text-gray-600">Contact us on WhatsApp: <a href="https://wa.me/254781052997" class="text-blue-500 underline">+254781052997</a></p>
    <p class="text-sm text-gray-400 mt-2">&copy; 2026 ClearVieaw Store</p>
  </footer>

  <!-- JavaScript -->
  <script>
    let currentPaymentMethod = 'paystack';
    let currentProduct = null;

    const products = [
      {
        name: 'DSTV Stream',
        priceKES: 600,
        description: 'Stream live DSTV channels for 1 month.',
        image: 'assets/dstv.jpg'
      },
      {
        name: 'Startimes ON',
        priceKES: 900,
        description: 'Watch live channels without monthly subscription.',
        image: 'assets/startimes.jpg'
      },
      {
        name: 'Sports TV',
        priceKES: 800,
        description: 'Unlimited sports coverage including EPL, La Liga, and more.',
        image: 'assets/sports.jpg'
      },
      {
        name: 'Netflix TV',
        priceKES: 900,
        description: 'Unlimited access to trending movies and TV series.',
        image: 'assets/movies.jpg'
      },
      {
        name: 'YouTube Premium',
        priceKES: 550,
        description: 'Ad-free YouTube experience with offline viewing.',
        image: 'assets/youtube.jpg'
      },
      {
        name: 'TikTok 18+',
        priceKES: 400,
        description: 'Exclusive access to 18+ content on TikTok.',
        image: 'assets/tiktok.jpg'
      }
    ];

    function setPaymentMethod(method) {
      currentPaymentMethod = method;
      
      // Update button styling
      document.getElementById('btn-paystack').classList.remove('ring-4', 'ring-yellow-400');
      document.getElementById('btn-mpesa').classList.remove('ring-4', 'ring-yellow-400');
      
      if (method === 'paystack') {
        document.getElementById('btn-paystack').classList.add('ring-4', 'ring-yellow-400');
      } else if (method === 'mpesa') {
        document.getElementById('btn-mpesa').classList.add('ring-4', 'ring-yellow-400');
      }

      // Re-render products
      renderProducts();
    }

    function createProductCard(product, index) {
      return `
        <div class="bg-white rounded-lg shadow-md p-4">
          <img src="${product.image}" alt="${product.name}" class="w-full h-40 object-cover rounded-md mb-2">
          <h3 class="text-lg font-semibold">${product.name}</h3>
          <p class="text-sm text-gray-500 mb-2">KES ${(product.priceKES / 100).toFixed(2)}</p>
          <p class="text-sm mb-4">${product.description}</p>
          <button onclick="initPayment(${index})" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">
            Buy Now
          </button>
        </div>
      `;
    }

    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = products.map((p, i) => createProductCard(p, i)).join('');
    }

    function initPayment(productIndex) {
      currentProduct = products[productIndex];

      if (currentPaymentMethod === 'paystack') {
        payWithPaystack(productIndex);
      } else if (currentPaymentMethod === 'mpesa') {
        payWithMPesa(productIndex);
      }
    }

    // ===== PAYSTACK INTEGRATION =====
    function payWithPaystack(productIndex) {
      const product = products[productIndex];
      const email = prompt('Please enter your email address:');
      if (!email) return;

      const handler = PaystackPop.setup({
        key: 'pk_live_ef7d34cf55b8a86c1da377997b0705b622c9d0ae',
        email: email,
        amount: product.priceKES,
        currency: 'KES',
        ref: 'ref_' + Math.floor((Math.random() * 1000000000) + 1),
        onClose: function() {
          alert('Payment window closed.');
        },
        callback: function(response) {
          alert(`Payment successful for ${product.name}! Reference: ${response.reference}`);
          // window.location.href = `thank-you.html?product=${product.name}&email=${email}&ref=${response.reference}`;
        }
      });
      handler.openIframe();
    }

    // ===== M-PESA INTEGRATION =====
    function payWithMPesa(productIndex) {
      const product = products[productIndex];
      const phone = prompt('Please enter your M-Pesa phone number (format: 254757780414):');
      if (!phone) return;

      const email = prompt('Please enter your email address:');
      if (!email) return;

      // Simulate M-Pesa payment initiation
      alert(`M-Pesa payment initiated for ${product.name}!\n\nAmount: KES ${(product.priceKES / 100).toFixed(2)}\nPhone: ${phone}\n\nYou will receive a prompt on your phone to confirm payment.`);
      
      // In production, you would send this to your backend which would communicate with Daraja API
      // Backend would handle the M-Pesa STK push
      console.log({
        product: product.name,
        amount: product.priceKES / 100,
        phone: phone,
        email: email
      });
    }

    // Initialize payment method on page load
    window.addEventListener('DOMContentLoaded', function() {
      renderProducts();
      setPaymentMethod('paystack'); // Default to Paystack
    });
  </script>

</body>
</html>
