<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="ClearView Store - Africa's premier digital subscription hub. Fast delivery, secure payments.">
  <title>ClearView Store | Crystal Clear Access</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  
  <style>
    body { background-color: #020617; }
    .glass { @apply bg-slate-900/80 backdrop-blur-md border border-slate-800; }
    .currency-pill { @apply px-3 py-1.5 rounded-xl text-xs font-bold border border-slate-700 cursor-pointer transition-all hover:bg-slate-800 text-slate-400; }
    .currency-active { @apply bg-blue-600 border-blue-500 text-white shadow-lg shadow-blue-900/40; }
    
    .logo-3d {
      background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4), inset 0 -4px 6px rgba(0,0,0,0.2);
    }

    .skeleton {
      background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
    }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    #checkoutModal[open] { animation: show 0.3s ease-out forwards; }
    @keyframes show {
      from { opacity: 0; transform: scale(0.9) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    #checkoutModal::backdrop { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(8px); }

    .toast-entry { animation: slideIn 0.5s ease-out forwards; }
    .toast-exit { animation: slideOut 0.5s ease-in forwards; }
    @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-100%); opacity: 0; } }
  </style>
</head>
<body class="text-slate-200 antialiased font-sans">

  <div id="toastContainer" class="fixed bottom-6 left-6 z-[110] pointer-events-none"></div>

  <dialog id="checkoutModal" class="glass rounded-[2.5rem] p-8 w-full max-w-md text-slate-200">
    <div class="flex flex-col gap-6">
        <div class="flex justify-between items-center">
            <h2 class="text-xl font-black text-white uppercase tracking-tight">Checkout</h2>
            <button onclick="closeModal()" class="text-slate-500 hover:text-white">✕</button>
        </div>
        <div class="bg-slate-950/50 p-4 rounded-2xl border border-slate-800">
            <p class="text-xs text-slate-500 font-bold uppercase tracking-widest mb-1">Product</p>
            <p id="modalProductName" class="text-lg font-bold text-white"></p>
            <p id="modalProductPrice" class="text-blue-500 font-black text-xl"></p>
        </div>

        <div id="tierSelector" class="hidden">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest block mb-2">Select Plan</label>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setTier('basic')" id="tier-basic" class="p-3 rounded-xl border border-blue-600 bg-blue-600/20 text-xs font-bold">BASIC (1 Device)</button>
                <button onclick="setTier('premium')" id="tier-premium" class="p-3 rounded-xl border border-slate-800 bg-slate-950 text-xs font-bold">PREMIUM (3 Devices)</button>
            </div>
        </div>

        <div>
            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest block mb-2">Delivery Email</label>
            <input type="email" id="customerEmail" placeholder="name@example.com" 
                class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-white focus:outline-none focus:border-blue-500 transition-colors">
        </div>
        <button id="payButton" onclick="processPayment()" 
            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all active:scale-95 uppercase tracking-widest text-xs">
            Complete Purchase
        </button>
    </div>
  </dialog>

  <header class="glass sticky top-0 z-50 p-4 flex flex-col lg:flex-row justify-between items-center border-b border-slate-800 gap-4">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 logo-3d rounded-xl flex items-center justify-center font-black text-white text-xl">C</div>
        <h1 class="text-2xl font-black text-white tracking-tighter">ClearView <span class="text-blue-500">Store</span></h1>
    </div>
    <div class="flex flex-wrap justify-center gap-2" id="currencySelector">
        <span onclick="setCurrency('USD')" class="currency-pill currency-active" id="btn-USD">USD</span>
        <span onclick="setCurrency('KES')" class="currency-pill" id="btn-KES">KES</span>
        <span onclick="setCurrency('NGN')" class="currency-pill" id="btn-NGN">NGN</span>
        <span onclick="setCurrency('GHS')" class="currency-pill" id="btn-GHS">GHS</span>
        <span onclick="setCurrency('ZAR')" class="currency-pill" id="btn-ZAR">ZAR</span>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-6">
    <section class="text-center py-16">
      <h2 class="text-5xl md:text-7xl font-black mb-6 text-white tracking-tight leading-none">Crystal Clear <span class="text-blue-500 text-shadow-xl">Access.</span></h2>
      <p class="text-lg text-slate-400 mb-10 max-w-2xl mx-auto">Instant digital delivery across the Globe.</p>
    </section>

    <section id="products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
        <div class="skeleton h-80 rounded-[2rem]"></div>
        <div class="skeleton h-80 rounded-[2rem]"></div>
        <div class="skeleton h-80 rounded-[2rem]"></div>
    </section>
  </main>

  <script>
    const PAYSTACK_PUBLIC_KEY = 'pk_live_ef7d34cf55b8a86c1da377997b0705b622c9d0ae';
    let currentCurrency = 'USD';
    let exchangeRates = { USD: 1, KES: 132.5, NGN: 1450, GHS: 14.8, ZAR: 18.4 };
    let selectedProduct = null;
    let activeTierPrice = 0;

    const products = [
      { name: 'Standard IPTV', priceUSD: 6.00, premiumPriceUSD: 10.00, image: 'assets/iptvsub.jpg', desc: '12k+ Global channels. 4K Streaming.', hasTiers: true },
      { name: 'Startimes Combo', priceUSD: 9.80, image: 'assets/startimes.jpg', desc: 'Family bundle. Local channels included.' },
      { name: 'CapCut Pro', priceUSD: 5.00, image: 'assets/capcut.jpg', desc: 'Full Premium Features. No Watermark.' },
      { name: 'DSTV Stream', priceUSD: 6.00, image: 'assets/dstv.jpg', desc: '1 Month Premium Access. Live TV & Sports.' },
      { name: 'IPTV Unlocked', priceUSD: 7.00, image: 'assets/iptv.jpg', desc: 'Global 12,000+ Channels. 4K Streaming.' },
      { name: 'Netflix Pro', priceUSD: 5.00, image: 'assets/movies.jpg', desc: 'VOD Library. Latest Hollywood releases.' }
    ];

    async function initialize() {
      try {
        const res = await fetch('https://open.er-api.com/v6/latest/USD');
        const data = await res.json();
        if(data.rates) exchangeRates = data.rates;
      } catch (e) { console.warn("Rates fallback active."); }
      renderProducts();
    }

    function setCurrency(cur) {
      currentCurrency = cur;
      document.querySelectorAll('.currency-pill').forEach(el => el.classList.remove('currency-active'));
      document.getElementById(`btn-${cur}`).classList.add('currency-active');
      renderProducts();
    }

    function openModal(product) {
        selectedProduct = product;
        activeTierPrice = product.priceUSD;
        
        const tierUI = document.getElementById('tierSelector');
        if(product.hasTiers) {
            tierUI.classList.remove('hidden');
            setTier('basic');
        } else {
            tierUI.classList.add('hidden');
            updateModalPrice(activeTierPrice);
        }
        
        document.getElementById('modalProductName').innerText = product.name;
        document.getElementById('checkoutModal').showModal();
    }

    function setTier(tier) {
        activeTierPrice = (tier === 'premium') ? selectedProduct.premiumPriceUSD : selectedProduct.priceUSD;
        
        const basicBtn = document.getElementById('tier-basic');
        const premBtn = document.getElementById('tier-premium');
        
        if(tier === 'premium') {
            premBtn.className = "p-3 rounded-xl border border-blue-600 bg-blue-600/20 text-xs font-bold text-white";
            basicBtn.className = "p-3 rounded-xl border border-slate-800 bg-slate-950 text-xs font-bold text-slate-400";
        } else {
            basicBtn.className = "p-3 rounded-xl border border-blue-600 bg-blue-600/20 text-xs font-bold text-white";
            premBtn.className = "p-3 rounded-xl border border-slate-800 bg-slate-950 text-xs font-bold text-slate-400";
        }
        updateModalPrice(activeTierPrice);
    }

    function updateModalPrice(usdAmount) {
        const price = (usdAmount * exchangeRates[currentCurrency]).toLocaleString(undefined, { style: 'currency', currency: currentCurrency, maximumFractionDigits: 0 });
        document.getElementById('modalProductPrice').innerText = price;
    }

    function closeModal() { document.getElementById('checkoutModal').close(); }

    function processPayment() {
        const email = document.getElementById('customerEmail').value;
        const btn = document.getElementById('payButton');
        if (!email || !email.includes('@')) return alert("Enter a valid email.");
        btn.innerText = "Connecting...";
        btn.disabled = true;

        PaystackPop.setup({
            key: PAYSTACK_PUBLIC_KEY,
            email: email,
            amount: Math.round(activeTierPrice * exchangeRates[currentCurrency] * 100),
            currency: currentCurrency,
            callback: (res) => window.location.href = `thank-you.html?product=${encodeURIComponent(selectedProduct.name)}&email=${encodeURIComponent(email)}`,
            onClose: () => { btn.innerText = "Complete Purchase"; btn.disabled = false; }
        }).openIframe();
    }

    function renderProducts() {
      document.getElementById('products').innerHTML = products.map((p, i) => `
        <div class="bg-slate-900 rounded-[2.5rem] overflow-hidden border border-slate-800 transition-all hover:border-blue-500/40 relative group">
          <div class="relative h-52 overflow-hidden">
            <img src="${p.image}" class="w-full h-full object-cover opacity-60 group-hover:scale-110 transition-all duration-700">
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent"></div>
          </div>
          <div class="p-8 -mt-10 relative z-10">
            <h3 class="text-2xl font-black text-white mb-1">${p.name}</h3>
            <p class="text-3xl font-black text-blue-500 mb-4">${(p.priceUSD * exchangeRates[currentCurrency]).toLocaleString(undefined, { style: 'currency', currency: currentCurrency, maximumFractionDigits: 0 })}</p>
            <p class="text-sm text-slate-500 mb-8 min-h-[40px]">${p.desc}</p>
            <button onclick='openModal(${JSON.stringify(p)})' class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all active:scale-95 uppercase tracking-widest text-xs">Instant Access</button>
          </div>
        </div>
      `).join('');
    }
    window.addEventListener('DOMContentLoaded', initialize);
  </script>
</body>
</html>
