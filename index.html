<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyDigitalHub | Pay with Paystack</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  
  <style>
    .badge { @apply absolute top-3 right-3 px-3 py-1 text-xs font-bold text-white rounded-full shadow-lg z-10; }
    body { background-color: #020617; }
    .glass { @apply bg-slate-900/80 backdrop-blur-md border border-slate-800; }
  </style>
</head>
<body class="text-slate-200 antialiased">

  <header class="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b">
    <h1 class="text-2xl font-black text-blue-500 tracking-tighter">MyDigitalHub</h1>
    <nav class="hidden md:flex items-center gap-6">
      <a href="#" class="font-medium hover:text-blue-400 transition">Home</a>
      <a href="#products" class="font-medium hover:text-blue-400 transition">Shop</a>
      <a href="https://wa.me/254757780414" class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-lg text-sm font-bold transition">WhatsApp Help</a>
    </nav>
  </header>

  <main class="max-w-6xl mx-auto p-6">
    <section class="text-center py-16">
      <h2 class="text-5xl font-black mb-6 text-white tracking-tight">Fast, Secure Checkout</h2>
      <p class="text-lg text-slate-400 mb-10">Pay via M-Pesa or Card. Instant activation.</p>
    </section>

    <section id="products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></section>
  </main>

  <script>
    // ⚠️ REPLACE THIS with your actual Paystack Public Key from your dashboard
    const PAYSTACK_PUBLIC_KEY = 'pk_live_your_actual_key_here';
    const KES_RATE = 132.50; // Current estimate for display

    const products = [
      { name: 'DSTV Stream', priceUSD: 6.00, cat: 'TV', image: 'assets/dstv.jpg', tag: 'Hot', desc: '1 Month Premium Access' },
      { name: 'IPTV Unlocked', priceUSD: 7.00, cat: 'IPTV', image: 'assets/iptv.jpg', tag: 'Best Value', desc: 'Global 12,000+ Channels' },
      { name: 'Sports TV Pro', priceUSD: 8.50, cat: 'TV', image: 'assets/sports.jpg', desc: 'All Major Leagues Live' }
    ];

    function payWithPaystack(product) {
      // Paystack amount is in Kobo/Cents (Multiply by 100)
      // Since your prices are USD, we convert to KES for Paystack (or use USD if your account supports it)
      const amountInKes = Math.round(product.priceUSD * KES_RATE);

      const handler = PaystackPop.setup({
        key: PAYSTACK_PUBLIC_KEY,
        email: prompt("Please enter your email for the receipt:"), // Simple way to get user email
        amount: amountInKes * 100, 
        currency: 'KES', 
        ref: 'MDH-' + Math.floor((Math.random() * 1000000000) + 1), // Generate random ref
        metadata: {
          custom_fields: [
            { display_name: "Product", variable_name: "product", value: product.name }
          ]
        },
        callback: function(response){
          // On success redirect to thank-you page
          window.location.href = `thank-you.html?product=${encodeURIComponent(product.name)}&reference=${response.reference}`;
        },
        onClose: function(){
          alert('Transaction cancelled.');
        }
      });
      handler.openIframe();
    }

    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = products.map((product, i) => {
        const estKes = (product.priceUSD * KES_RATE).toLocaleString();
        return `
          <div class="bg-slate-900 rounded-3xl overflow-hidden border border-slate-800 transition-all hover:border-blue-500/30 relative group shadow-2xl">
            ${product.tag ? `<span class="badge bg-blue-600">${product.tag}</span>` : ''}
            <img src="${product.image}" class="w-full h-52 object-cover opacity-80" loading="lazy">
            <div class="p-6">
              <h3 class="text-xl font-bold text-white">${product.name}</h3>
              <div class="flex items-baseline gap-2 mb-4">
                  <span class="text-3xl font-black text-white">$${product.priceUSD.toFixed(2)}</span>
                  <span class="text-xs text-slate-500 italic">~ KES ${estKes}</span>
              </div>
              <p class="text-sm text-slate-400 mb-6 leading-relaxed">${product.desc}</p>
              <button onclick='payWithPaystack(${JSON.stringify(product)})' 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition duration-300">
                Buy Now
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    window.addEventListener('DOMContentLoaded', renderProducts);
  </script>
</body>
</html>
