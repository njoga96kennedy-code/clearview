<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyDigitalHub - Premium Digital Access</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Paystack -->
  <script src="https://js.paystack.co/v1/inline.js"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<!-- HEADER -->
<header class="bg-white shadow-md p-4 flex justify-between">
  <h1 class="text-2xl font-bold text-blue-600">MyDigitalHub</h1>
  <nav>
    <a href="#" class="px-3">Home</a>
    <a href="#products" class="px-3">Products</a>
    <a href="#contact" class="px-3">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="text-center py-12 bg-gradient-to-r from-blue-600 to-indigo-600 text-white">
  <h2 class="text-4xl font-bold mb-3">Unlimited Entertainment, One Click Away</h2>
  <p class="mb-3">Instant access to streaming & sports</p>
  <span class="bg-white text-blue-600 px-4 py-2 rounded-full font-semibold">
    🔥 From $5 Only
  </span>
</section>

<!-- PRODUCTS -->
<section id="products" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 p-6"></section>

<!-- FOOTER -->
<footer id="contact" class="bg-white p-6 text-center border-t">
  <p>WhatsApp: 
    <a href="https://wa.me/254757780414" class="text-blue-500 underline">
      +254757780414
    </a>
  </p>
  <p class="text-sm text-gray-400 mt-2">© 2025 MyDigitalHub</p>
</footer>

<script>
const PAYSTACK_PUBLIC_KEY = "pk_live_ef7d34cf55b8a86c1da377997b0705b622c9d0ae"; // 🔴 REPLACE THIS

const products = [
  {
    name: 'Premium Live TV Access',
    price: 6.00,
    description: 'Watch global live TV instantly.',
    image: './assets/dstv.jpg'
  },
  {
    name: 'Sports Streaming Package',
    price: 8.50,
    description: 'Enjoy football & live sports.',
    image: './assets/sports.jpg'
  },
  {
    name: 'Movies & Series Access',
    price: 9.00,
    description: 'Unlimited trending movies.',
    image: './assets/movies.jpg'
  }
];

function payWithPaystack(product) {
  let email = prompt("Enter your email:");
  if (!email) return;

  let handler = PaystackPop.setup({
    key: PAYSTACK_PUBLIC_KEY,
    email: email,

    // Paystack uses kobo (multiply by 100)
    amount: product.price * 100,
    currency: "USD",

    metadata: {
      custom_fields: [
        {
          display_name: "Product",
          variable_name: "product",
          value: product.name
        }
      ]
    },

    callback: function(response) {
      const productName = encodeURIComponent(product.name);
      const userEmail = encodeURIComponent(email);

      window.location.href = `thank-you.html?product=${productName}&email=${userEmail}`;
    },

    onClose: function() {
      alert("Transaction cancelled");
    }
  });

  handler.openIframe();
}

function createCard(p, i) {
  return `
    <div class="bg-white rounded-xl shadow p-4">
      <img 
        src="${p.image}" 
        onerror="this.src='https://via.placeholder.com/300x200?text=Image+Missing'"
        class="w-full h-40 object-cover rounded mb-3"
      >

      <h3 class="font-bold">${p.name}</h3>
      <p class="text-green-600 font-semibold">$${p.price}</p>
      <p class="text-sm text-gray-500 mb-2">${p.description}</p>

      <p class="text-xs text-gray-400 mb-3">✔ Instant Delivery</p>

      <button 
        onclick="payWithPaystack(products[${i}])"
        class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
        Pay Now
      </button>
    </div>
  `;
}

function render() {
  const container = document.getElementById('products');
  container.innerHTML = products.map((p, i) => createCard(p, i)).join('');
}

window.onload = render;
</script>

</body>
</html>
