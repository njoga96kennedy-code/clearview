<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="ClearView Store - Africa's premier digital subscription hub. Fast delivery, secure payments.">
  <title>ClearView Store | Crystal Clear Access</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  
  <style>
    body { background-color: #020617; color: white; font-family: sans-serif; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
    .currency-pill { @apply px-3 py-1.5 rounded-xl text-xs font-bold border border-slate-700 cursor-pointer transition-all hover:bg-slate-800 text-slate-400; }
    .currency-active { @apply bg-blue-600 border-blue-500 text-white shadow-lg shadow-blue-900/40; }
  </style>
</head>
<body class="min-h-screen">

  <nav class="fixed w-full z-50 px-6 py-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center glass rounded-2xl p-4">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-black text-xl shadow-lg shadow-blue-500/20">CV</div>
        <span class="font-black text-xl tracking-tighter">CLEARVIEW</span>
      </div>
      
      <div id="currencySelector" class="flex gap-2">
        <div class="currency-pill currency-active" onclick="setCurrency('KES')">KES</div>
        <div class="currency-pill" onclick="setCurrency('USD')">USD</div>
        <div class="currency-pill" onclick="setCurrency('NGN')">NGN</div>
      </div>
    </div>
  </nav>

  <header class="pt-32 pb-16 px-6 text-center">
    <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tight">Premium Access, <span class="text-blue-500">Zero Lag.</span></h1>
    <p class="text-slate-400 max-w-2xl mx-auto text-lg">Instant automated delivery of premium digital accounts. Fully secured by Paystack.</p>
  </header>

  <main class="max-w-7xl mx-auto px-6 pb-24">
    <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
      </div>
  </main>

  <script>
    const API_BASE = "https://your-render-app.onrender.com"; // UPDATE THIS to your live backend URL
    
    const products = [
      { id: 1, name: "CapCut Pro", priceUSD: 5, image: "assets/capcut.jpg", desc: "Full pro features, no watermarks." },
      { id: 2, name: "Netflix Pro", priceUSD: 10, image: "assets/netflix.jpg", desc: "4K Ultra HD viewing on any device." },
      { id: 3, name: "IPTV Premium", priceUSD: 15, image: "assets/iptv.jpg", desc: "15,000+ Channels & VOD." },
      { id: 4, name: "Canva Pro", priceUSD: 4, image: "assets/canva.jpg", desc: "Brand kits and premium elements." }
    ];

    let currentCurrency = 'KES';
    let exchangeRates = { KES: 130, USD: 1, NGN: 1500 };
    let stockData = {};

    async function init() {
        await fetchExchangeRates();
        await fetchStock();
        renderProducts();
    }

    async function fetchExchangeRates() {
        try {
            const res = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await res.json();
            exchangeRates = data.rates;
        } catch (e) { console.warn("Using fallback exchange rates."); }
    }

    async function fetchStock() {
        try {
            const res = await fetch(`${API_BASE}/api/stock`);
            stockData = await res.json();
        } catch (e) { console.error("Could not load stock data."); }
    }

    function setCurrency(curr) {
        currentCurrency = curr;
        document.querySelectorAll('.currency-pill').forEach(p => {
            p.classList.toggle('currency-active', p.innerText === curr);
        });
        renderProducts();
    }

    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = products.map(p => {
            const count = stockData[p.name] || 0;
            const isOut = count === 0;
            const price = (p.priceUSD * exchangeRates[currentCurrency]).toLocaleString(undefined, {
                style: 'currency', currency: currentCurrency, maximumFractionDigits: 0
            });

            return `
                <div class="bg-slate-900 rounded-[2.5rem] border border-slate-800 transition-all hover:border-blue-500/40 relative overflow-hidden ${isOut ? 'opacity-60' : ''}">
                    <div class="h-48 overflow-hidden relative">
                        <img src="${p.image}" class="w-full h-full object-cover opacity-50">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent"></div>
                    </div>
                    <div class="p-8 -mt-10 relative z-10">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-bold uppercase tracking-widest ${count > 3 ? 'text-blue-400' : 'text-red-500'}">
                                ${isOut ? 'Out of Stock' : `${count} available`}
                            </span>
                        </div>
                        <h3 class="text-2xl font-black mb-1">${p.name}</h3>
                        <p class="text-3xl font-black text-blue-500 mb-4">${price}</p>
                        <button 
                            ${isOut ? 'disabled' : ''} 
                            onclick='payWithPaystack(${JSON.stringify(p)})'
                            class="w-full py-4 rounded-2xl font-bold transition-all ${isOut ? 'bg-slate-800 text-slate-500' : 'bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-900/20'}">
                            ${isOut ? 'Sold Out' : 'Instant Access'}
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function payWithPaystack(product) {
        const email = prompt("Enter your email for automated delivery:");
        if (!email) return;

        const handler = PaystackPop.setup({
            key: 'YOUR_PUBLIC_KEY', // REPLACE with your Public Key
            email: email,
            amount: Math.round(product.priceUSD * exchangeRates[currentCurrency] * 100),
            currency: currentCurrency,
            metadata: {
                custom_fields: [{ display_name: "Product", variable_name: "product", value: product.name }]
            },
            callback: function(response) {
                window.location.href = `thank-you.html?product=${product.name}&email=${email}`;
            }
        });
        handler.openIframe();
    }

    init();
  </script>
</body>
</html>
