<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearView TV</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0f0f0f;
    color: #fff;
}

header {
    background: #000;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 40px;
}

.hero p {
    opacity: 0.7;
}

.btn {
    background: #ff3d00;
    padding: 15px 25px;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    display: inline-block;
    margin-top: 20px;
}

.pricing {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 50px;
    flex-wrap: wrap;
}

.card {
    background: #1c1c1c;
    padding: 25px;
    border-radius: 10px;
    width: 250px;
    text-align: center;
}

.card h2 {
    margin-bottom: 10px;
}

.card p {
    opacity: 0.6;
}

footer {
    text-align: center;
    padding: 20px;
    background: #000;
}
</style>
</head>

<body>

<header>ClearView TV</header>

<section class="hero">
    <h1>Unlimited Movies & Live TV</h1>
    <p>Stream anytime. Anywhere. No limits.</p>
    <a href="#pricing" class="btn">Get Access</a>
</section>

<section id="pricing" class="pricing">

<div class="card">
    <h2>Basic</h2>
    <p>$5 / month</p>
    <p>Mobile Access</p>
    <a href="#" class="btn">Buy Now</a>
</div>

<div class="card">
    <h2>Standard</h2>
    <p>$10 / month</p>
    <p>HD Streaming</p>
    <a href="#" class="btn">Buy Now</a>
</div>

<div class="card">
    <h2>Premium</h2>
    <p>$15 / month</p>
    <p>4K + Live Sports</p>
    <a href="#" class="btn">Buy Now</a>
</div>

</section>

<footer>
    © 2026 ClearView TV
</footer>

</body>
</html>
